<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>KTX Optimizer</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Preserves the path and redirects to index.html
      var repo = '/KT-optimizer-vip';
      var path = window.location.pathname.replace(repo, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = repo + '/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
